services:
  - type: web
    name: quizarena-server
    runtime: node
    plan: free
    buildCommand: |
      cd ../shared && pnpm install && pnpm run build
      cd ../server && pnpm install && npx prisma generate && pnpm run build
    startCommand: cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CLIENT_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: quizarena-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: quizarena-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: quizarena-db
    plan: free
    databaseName: quizarena
    user: quizarena

  - name: quizarena-redis
    plan: free
