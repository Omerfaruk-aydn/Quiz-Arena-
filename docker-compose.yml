version: '3.8'

services:
  client:
    build: ./client
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_SOCKET_URL: http://localhost:4000
    depends_on:
      - server

  server:
    build: ./server
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: http://localhost:5173
      DATABASE_URL: postgresql://quizarena:quizarena_secret@postgres:5432/quizarena
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production
      JWT_REFRESH_SECRET: change_me_refresh_in_production
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quizarena
      POSTGRES_PASSWORD: quizarena_secret
      POSTGRES_DB: quizarena
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
